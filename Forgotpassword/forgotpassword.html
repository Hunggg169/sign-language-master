<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./forgotpassword.css" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="../Image/image(1591).png"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="logo">
      <a href="../Index/index.html">
        <img src="../Image/image(1591).png" alt="Logo" />
      </a>
    </div>
    <div class="text"><span>Quên Mật Khẩu?</span></div>
    <div class="login-box">
      <span class="span-text"
        >Nhập địa chỉ email của bạn. Chúng tôi sẽ gửi liên kết đến email của
        bạn.</span
      >
      <form action="./forgotpassword.php" method="POST">
        <div class="text-form">
          <span>Email</span>
          <i class="fa-solid fa-envelope"></i>
          <input
            type="text"
            name="username"
            placeholder="Email or Username"
            required
          />
        </div>

        <button type="submit" class="submit-btn">Xác Nhận</button>
      </form>
      <div class="text-bottom">
        <div class="chua-co-tk">
          <span>Bạn đã có tài khoản?</span>
          <a href="../Login/login.html">Đăng Nhập!</a>
        </div>
        <div class="quen-mk">
          <a href="../Register/register.html">Đăng Ký Tài Khoản Mới!</a>
        </div>
      </div>
    </div>
    <script src="./forgotpassword.js"></script>
  </body>
</html>
