<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lại mật khẩu</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .reset-box {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 350px;
        max-width: 90%;
        /* giúp co giãn theo màn hình nhỏ */
        text-align: center;
      }

      .reset-box h2 {
        margin-bottom: 20px;
        font-size: 22px;
      }

      .reset-box input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
      }

      .reset-box button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
      }

      .reset-box button:hover {
        background: #0056b3;
      }

      .message {
        margin-top: 15px;
        font-size: 14px;
      }
      /* Responsive cho màn hình nhỏ (mobile < 480px) */

      @media (max-width: 480px) {
        body {
          padding: 15px;
        }
        .reset-box {
          padding: 20px;
          width: 100%;
        }
        .reset-box h2 {
          font-size: 20px;
        }
        .reset-box input,
        .reset-box button {
          font-size: 14px;
          padding: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="reset-box">
      <h2>Đặt lại mật khẩu</h2>
      <input
        type="password"
        id="newPassword"
        placeholder="Mật khẩu mới"
        required
      />
      <input
        type="password"
        id="confirmPassword"
        placeholder="Xác nhận mật khẩu"
        required
      />
      <button onclick="resetPassword()">Xác nhận</button>
      <div class="message" id="message"></div>
    </div>

    <script src="./resetpassword.js"></script>
  </body>
</html>
