<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Language Master</title>
    <link rel="stylesheet" href="./QandA.css" />
    <link rel="shortcut icon" type="image/png" href="../Image/image(1591).png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
    <header class="header">
        <div class="background">
            <a href="../Learn/learn.html">
                <img src="../Image/image(1591).png" alt="Background" />
            </a>
        </div>
        <h1>Hỏi Đáp Nhanh</h1>
    </header>

    <main class="qa-container">
        <section class="ask-box">
            <textarea id="questionInput" placeholder="Nhập câu hỏi của bạn..." rows="3"></textarea>
            <button id="sendBtn">Gửi</button>
        </section>

        <section class="qa-list" id="qaList">
            <!-- Các câu hỏi và trả lời sẽ được thêm ở đây -->
        </section>
    </main>

    <footer class="footer">
        <p>© 2025 Sign Language Master | Trang hỏi đáp nhanh</p>
    </footer>
    <script src="./QandA.js"></script>
